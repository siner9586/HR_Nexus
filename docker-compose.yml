services:
  postgres:
    image: postgres:16-alpine
    container_name: hr-nexus-postgres
    environment:
      POSTGRES_DB: hr_nexus
      POSTGRES_USER: hrnexus
      POSTGRES_PASSWORD: hrnexus
    ports:
      - "5432:5432"
    volumes:
      - hr_nexus_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrnexus -d hr_nexus"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: hr-nexus-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: hr-nexus-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hrnexus:hrnexus@postgres:5432/hr_nexus?schema=public
      NEXTAUTH_SECRET: docker-local-secret-change-me
      NEXTAUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      BILLING_MOCK_MODE: "true"
      UPLOAD_PROVIDER: local
    ports:
      - "3000:3000"

volumes:
  hr_nexus_postgres:
